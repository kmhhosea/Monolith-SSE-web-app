name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sse_platform
          POSTGRES_USER: sse
          POSTGRES_PASSWORD: sse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sse -d sse_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      API_PORT: 4000
      WEB_URL: http://localhost:3000
      DATABASE_URL: postgres://sse:sse@localhost:5432/sse_platform
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      COOKIE_SECRET: ci-cookie-secret
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_NAME: SSE Academic Collaboration Platform

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run build
      - run: npm run test:e2e
