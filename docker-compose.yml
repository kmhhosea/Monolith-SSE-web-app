version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sse-postgres
    environment:
      POSTGRES_DB: sse_platform
      POSTGRES_USER: sse
      POSTGRES_PASSWORD: sse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sse -d sse_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
